# detekt configuration — openRS_
# Conservative initial config: Compose-aware, low false-positive rate.

complexity:
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 15
    ignoreAnnotated:
      - 'Composable'
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 25
    thresholdInInterfaces: 15
  CyclomaticComplexMethod:
    threshold: 20
  NestedBlockDepth:
    threshold: 6

naming:
  FunctionNaming:
    ignoreAnnotated:
      - 'Composable'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9_]*'

style:
  MagicNumber:
    active: false
  MaxLineLength:
    maxLineLength: 140
    excludeCommentStatements: true
  ReturnCount:
    max: 5
  UnusedPrivateMember:
    ignoreAnnotated:
      - 'Preview'
      - 'Composable'
  WildcardImport:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: false
